<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPS BUS TRACKING</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        .header { background: #075E54; color: white; padding: 12px; text-align: center; font-weight: bold; z-index: 1001; position: relative; }
        #map { height: calc(100vh - 45px); width: 100%; z-index: 1; background: #f0f0f0; }
        .info-card { 
            position: absolute; top: 70px; left: 15px; right: 15px; 
            background: white; padding: 12px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; 
            border-left: 5px solid #075E54; display: flex; justify-content: space-between; align-items: center;
        }
        .view-toggle { position: absolute; top: 145px; right: 15px; z-index: 1000; background: white; padding: 5px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);}
        .view-toggle button { padding: 8px 12px; border: none; background: #f0f0f0; cursor: pointer; font-size: 12px; font-weight: bold; border-radius: 5px; }
        .view-toggle button.active { background: #075E54; color: white; }
        .status-dot { height: 10px; width: 10px; background-color: #25D366; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">SAGAR PUBLIC SCHOOL - LIVE</div>

<div class="info-card">
    <div>
        <b style="color:#075E54; font-size: 16px;" id="busName">🚌 BUS-01</b><br>
        <small id="tm" style="color:gray;">Connecting...</small>
    </div>
    <div style="text-align: right;">
        <span id="sp" style="font-weight: bold; color: #333;">0 km/h</span><br>
        <small id="liveText" style="color: #25D366;"><span class="status-dot"></span>Live</small>
    </div>
</div>

<div class="view-toggle">
    <button id="btnNormal" class="active" onclick="switchMap('normal')">Normal</button>
    <button id="btnSat" onclick="switchMap('sat')">Satellite</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>

<script>
    // Aapki Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYFtkg5bFhsEj7J-NxZjuqWY-IgIRTGnV2C5OjOa2kXOs7JJzYTrPYzWgNyT2y8qC7/exec"; 

    var map, marker, normalLayer, satLayer;
    var firstLoad = true;

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([25.6127, 85.1588], 16);
        
        normalLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 20
        });

        // Naya Top-View Bus Icon (Yeh ghumne par sahi dikhta hai)
        var busIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/741/741407.png',
            iconSize: [35, 35],
            iconAnchor: [17, 17], // Center of the icon
            rotationOrigin: 'center center'
        });

        marker = L.marker([25.6127, 85.1588], { 
            icon: busIcon, 
            rotationAngle: 0 
        }).addTo(map);
        
        fetchData();
        setInterval(fetchData, 5000); 
    }

    function switchMap(type) {
        if (type === 'sat') {
            if (!map.hasLayer(satLayer)) { map.addLayer(satLayer); map.removeLayer(normalLayer); }
            document.getElementById('btnSat').className = 'active';
            document.getElementById('btnNormal').className = '';
        } else {
            if (!map.hasLayer(normalLayer)) { map.addLayer(normalLayer); map.removeLayer(satLayer); }
            document.getElementById('btnNormal').className = 'active';
            document.getElementById('btnSat').className = '';
        }
    }

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const res = await response.json();

            if (!res || res.lat === "---" || res.lat === "") {
                setOfflineUI();
                return;
            }

            var lat = parseFloat(res.lat);
            var lng = parseFloat(res.lng);
            var angle = parseFloat(res.bearing) || 0; 
            var newPos = [lat, lng];

            document.getElementById('sp').innerText = res.speed;
            document.getElementById('tm').innerText = "Last Update: " + res.time;
            document.getElementById('busName').innerText = "🚌 " + res.busId;
            
            document.getElementById('liveText').style.color = "#25D366";
            document.getElementById('liveText').innerHTML = '<span class="status-dot"></span>Live';

            // Position Update
            marker.setLatLng(newPos);
            
            // Rotation Update: Leaflet rotatedmarker use karke
            // Kuch icons 90 degree offset hote hain, agar bus side mein chale toh angle + 90 try karein
            marker.setRotationAngle(angle); 

            if (firstLoad) {
                map.setView(newPos, 17);
                firstLoad = false;
            }
        } catch (error) {
            setOfflineUI();
        }
    }

    function setOfflineUI() {
        document.getElementById('liveText').style.color = "gray";
        document.getElementById('liveText').innerHTML = "Offline";
    }

    window.onload = initMap;
</script>
</body>
</html>
